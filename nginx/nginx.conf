server {
    listen 80;
    server_name _;

    # ======================
    # Global performance settings
    # ======================
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;

    client_max_body_size 50M;

    # ======================
    # React frontend (static build)
    # ======================
    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri /index.html;
    }

    # ======================
    # Django API
    # ======================
    location /api/ {
        proxy_pass http://backend:8000;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ======================
    # MUSIC STREAMING (via Django)
    # ======================
    location /api/song/stream/ {
        proxy_pass http://backend:8000;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;

        # Forward Range headers for seeking / partial content
        proxy_set_header Range $http_range;
        proxy_set_header If-Range $http_if_range;

        # True streaming behavior
        proxy_buffering off;
        proxy_read_timeout 3600;
        proxy_send_timeout 3600;

        tcp_nodelay on;
    }

    # ======================
    # MinIO / S3 Storage (songs + thumbnails in S3 mode)
    # ======================
    location /music-storage/ {
        proxy_pass http://minio:9000;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Forward Range headers for seeking
        proxy_set_header Range $http_range;
        proxy_set_header If-Range $http_if_range;

        # Allow large uploads
        client_max_body_size 50M;

        proxy_buffering off;
    }

    # ======================
    # Django admin
    # ======================
    location /admin/ {
        proxy_pass http://backend:8000/admin/;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ======================
    # Static files (Django collected static)
    # ======================
    location /static/ {
        alias /var/www/static/;
        expires 30d;
        add_header Cache-Control "public, no-transform";
    }

    # ======================
    # Media files (Local)
    # ======================
    location /media/ {
        proxy_pass http://backend:8000/media/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        
        proxy_set_header Range $http_range;
        proxy_set_header If-Range $http_if_range;
    }

    # ======================
    # Gzip
    # ======================
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml+rss;
    gzip_min_length 256;
}
